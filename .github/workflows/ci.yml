name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_SUPABASE_URL: https://ci-test.supabase.co
      VITE_SUPABASE_ANON_KEY: ci-test-anon-key
      # Node's native localStorage/sessionStorage globals (stabilizing across
      # Node 22+) can shadow jsdom's real Storage implementation in vitest,
      # making localStorage.getItem/clear silently not-a-function. Disabling
      # keeps jsdom's implementation as the only one in scope during tests.
      NODE_OPTIONS: --no-experimental-webstorage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: payglue_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SECRET_KEY: ci-test-secret-key
      DJANGO_DEBUG: "1"
      CREDENTIAL_ENCRYPTION_KEY: "Ax6a1qI2W3nF8y9pR0cVb5tHj7kLmN2oQdSeUfXgYzA="
      PGDATABASE: payglue_test
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: 5432
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest -q
