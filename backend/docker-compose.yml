services:
  postgres:
    image: postgres:16-alpine
    container_name: payglue-postgres
    environment:
      POSTGRES_DB: ghost_glue
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ghost_glue_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ghost_glue"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ghost_glue_postgres_data:
