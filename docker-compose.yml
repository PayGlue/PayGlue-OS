services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ghost_glue
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ghost_glue_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ghost_glue"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ghost_glue_redis_data:/data

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: payglue_backend.config.settings
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ghost_glue
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DJANGO_DEBUG: "1"
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL:-}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-bWFzdGVya2V5Zm9ybG9jYWxkZXZlbG9wbWVudG9ubHk=}
      HOME: /tmp
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ''
      VITE_DEV_PROXY_TARGET: http://web:8000
      VITE_SUPABASE_URL: ${SUPABASE_URL:-}
      VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    depends_on:
      web:
        condition: service_started

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A payglue_backend.config worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      DJANGO_SETTINGS_MODULE: payglue_backend.config.settings
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ghost_glue
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DJANGO_DEBUG: "1"
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL:-}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-bWFzdGVya2V5Zm9ybG9jYWxkZXZlbG9wbWVudG9ubHk=}
      HOME: /tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  ghost-db:
    image: mysql:8.0
    profiles: ["ghost"]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ghost
      MYSQL_USER: ghost
      MYSQL_PASSWORD: ghost
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    volumes:
      - ghost_glue_ghost_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 8s
      timeout: 5s
      retries: 20

  ghost:
    image: ghost:5-alpine
    profiles: ["ghost"]
    depends_on:
      ghost-db:
        condition: service_healthy
    ports:
      - "2368:2368"
    environment:
      database__client: mysql
      database__connection__host: ghost-db
      database__connection__user: ghost
      database__connection__password: ghost
      database__connection__database: ghost
      url: http://localhost:2368
    volumes:
      - ghost_glue_ghost_content:/var/lib/ghost/content
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:2368/ghost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18

volumes:
  ghost_glue_postgres_data:
  ghost_glue_redis_data:
  ghost_glue_ghost_mysql_data:
  ghost_glue_ghost_content:
